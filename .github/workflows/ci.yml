name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node:
    name: Node check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run check

  python:
    name: Python contract gating tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # The gating contracts are static AST scanners, but importing the
      # contract package pulls in httpx (package __init__) and, via
      # gating_allowlist -> energy_registry, sqlalchemy. Install just those
      # so the suite can collect — no app/private-dep install needed.
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio httpx sqlalchemy
      - name: Run server-free gating contract tests
        run: python -m pytest python/tests/contracts/route_gating.py python/tests/contracts/gating.py -v
